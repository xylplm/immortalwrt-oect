name: Build ImmortalWrt OEC-turbo

on:
  workflow_dispatch:
    inputs:
      version:
        description: ImmortalWrt release version. Leave empty to use the latest stable release.
        required: false
        type: string
      variants:
        description: 'Build variants: all, or a space/comma separated list of base plus bypass.'
        required: false
        default: all
        type: string
      extra_packages:
        description: Extra packages appended to plus and bypass rootfs builds.
        required: false
        type: string
      publish_release:
        description: Publish build outputs to GitHub Releases.
        required: false
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '20 1 * * 5'

permissions:
  contents: write

concurrency:
  group: immortalwrt-oect-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOWNLOAD_BASE: https://downloads.immortalwrt.org/releases
  OECT_KERNEL: 6.1.y
  OECT_AUTO_KERNEL: true
  OECT_KERNEL_REPO: ophub/kernel
  OECT_KERNEL_USAGE: stable
  OECT_BUILDER_NAME: xylplm

jobs:
  prepare:
    name: Resolve build matrix
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.vars.outputs.version }}
      target: ${{ steps.vars.outputs.target }}
      target_dash: ${{ steps.vars.outputs.target_dash }}
      rootfs_profile: ${{ steps.vars.outputs.rootfs_profile }}
      board: ${{ steps.vars.outputs.board }}
      release_url: ${{ steps.vars.outputs.release_url }}
      variants: ${{ steps.vars.outputs.variants }}
      matrix: ${{ steps.vars.outputs.matrix }}
      extra_packages: ${{ steps.vars.outputs.extra_packages }}
      publish_release: ${{ steps.vars.outputs.publish_release }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      base_rootfs_partsize: ${{ steps.vars.outputs.base_rootfs_partsize }}
      plus_rootfs_partsize: ${{ steps.vars.outputs.plus_rootfs_partsize }}
      bypass_rootfs_partsize: ${{ steps.vars.outputs.bypass_rootfs_partsize }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve build inputs
        id: vars
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_VARIANTS: ${{ inputs.variants }}
          INPUT_EXTRA_PACKAGES: ${{ inputs.extra_packages }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION:-}"
          variants="${INPUT_VARIANTS:-}"
          extra_packages="${INPUT_EXTRA_PACKAGES:-}"
          prerelease="${INPUT_PRERELEASE:-}"
          publish_release="${INPUT_PUBLISH_RELEASE:-}"

          if [ -f config/build.env ]; then
            # shellcheck disable=SC1091
            . config/build.env
          fi

          target="${IMMORTALWRT_ROOTFS_TARGET:-armsr/armv8}"
          rootfs_profile="${IMMORTALWRT_ROOTFS_PROFILE:-generic}"
          board="${IMMORTALWRT_BOARD:-wxy-oect}"
          default_variants="${IMMORTALWRT_VARIANTS:-base plus bypass}"
          base_rootfs_partsize="${IMMORTALWRT_BASE_ROOTFS_PARTSIZE:-1280}"
          plus_rootfs_partsize="${IMMORTALWRT_PLUS_ROOTFS_PARTSIZE:-2048}"
          bypass_rootfs_partsize="${IMMORTALWRT_BYPASS_ROOTFS_PARTSIZE:-4096}"

          if [ -z "$variants" ] || [ "$variants" = 'all' ]; then
            variants="$default_variants"
          fi
          if [ -z "$prerelease" ]; then
            prerelease='false'
          fi
          if [ -z "$publish_release" ]; then
            publish_release='true'
          fi

          case "$prerelease" in
            true|false) ;;
            *) echo "Invalid prerelease value: $prerelease" >&2; exit 1 ;;
          esac
          case "$publish_release" in
            true|false) ;;
            *) echo "Invalid publish_release value: $publish_release" >&2; exit 1 ;;
          esac

          variants=$(printf '%s' "$variants" | tr ',;' '  ' | xargs)
          [ -n "$variants" ] || { echo 'No variants selected.' >&2; exit 1; }
          variants=$(printf '%s' "$variants" | tr ' ' '\n' | awk 'NF && !seen[$0]++' | xargs)
          for variant in $variants; do
            case "$variant" in
              base|plus|bypass) ;;
              *) echo "Unsupported variant: $variant" >&2; exit 1 ;;
            esac
          done

          for item in \
            "base:$base_rootfs_partsize" \
            "plus:$plus_rootfs_partsize" \
            "bypass:$bypass_rootfs_partsize"; do
            variant_name="${item%%:*}"
            partsize="${item#*:}"
            case "$partsize" in
              ''|*[!0-9]*) echo "Invalid rootfs partsize for ${variant_name}: ${partsize}" >&2; exit 1 ;;
            esac
            if [ "$partsize" -lt 1024 ]; then
              echo "Invalid rootfs partsize for ${variant_name}: ${partsize}. ophub packer requires at least 1024 MiB." >&2
              exit 1
            fi
          done

          if [ -z "$version" ]; then
            versions=$(
              curl -fsSL --retry 5 --retry-all-errors --retry-delay 10 --connect-timeout 30 --max-time 120 "$DOWNLOAD_BASE/" |
                grep -Eo 'href="[0-9]+\.[0-9]+\.[0-9]+/"' |
                sed -E 's#href="([^"]+)/"#\1#' |
                sort -V
            )
            version=$(printf '%s\n' "$versions" | tail -n 1)
          fi
          [ -n "$version" ] || { echo 'Unable to resolve an ImmortalWrt release version.' >&2; exit 1; }

          target_dash=${target//\//-}
          release_url="$DOWNLOAD_BASE/$version/targets/$target"

          matrix=$(python3 - "$variants" "$base_rootfs_partsize" "$plus_rootfs_partsize" "$bypass_rootfs_partsize" <<'PY'
          import json
          import sys

          variants = sys.argv[1].split()
          sizes = {
              'base': sys.argv[2],
              'plus': sys.argv[3],
              'bypass': sys.argv[4],
          }
          include = []
          for variant in variants:
              include.append({
                  'variant': variant,
                  'rootfs_partsize': sizes[variant],
                  'suffix': '' if variant == 'base' else f'-{variant}',
                  'openwrt_files': 'files/bypass' if variant == 'bypass' else 'false',
              })
          print(json.dumps({'include': include}, separators=(',', ':')))
          PY
          )

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "target_dash=$target_dash" >> "$GITHUB_OUTPUT"
          echo "rootfs_profile=$rootfs_profile" >> "$GITHUB_OUTPUT"
          echo "board=$board" >> "$GITHUB_OUTPUT"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"
          echo "variants=$variants" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "extra_packages=$extra_packages" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "base_rootfs_partsize=$base_rootfs_partsize" >> "$GITHUB_OUTPUT"
          echo "plus_rootfs_partsize=$plus_rootfs_partsize" >> "$GITHUB_OUTPUT"
          echo "bypass_rootfs_partsize=$bypass_rootfs_partsize" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.variant }}
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install host tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 aria2 asciidoc autoconf automake autopoint binutils bison btrfs-progs \
            build-essential bzip2 ca-certificates ccache clang cmake coreutils cpio curl \
            device-tree-compiler fakeroot flex gawk gettext git gzip haveged help2man intltool \
            jq libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev \
            lrzsz msmtp nano ninja-build ntpdate p7zip p7zip-full parted patch pigz pkgconf \
            python3 python3-cryptography python3-docutils python3-pip python3-ply python3-pyelftools \
            python3-requests python3-setuptools qemu-utils quilt re2c rsync scons sharutils \
            squashfs-tools subversion swig tar texinfo unzip vim wget xxd xz-utils zip zlib1g-dev zstd
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Download and verify ImageBuilder
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET_DASH: ${{ needs.prepare.outputs.target_dash }}
          RELEASE_URL: ${{ needs.prepare.outputs.release_url }}
        run: |
          set -euo pipefail
          imagebuilder="immortalwrt-imagebuilder-${VERSION}-${TARGET_DASH}.Linux-x86_64.tar.zst"

          curl -fsSLO --retry 5 --retry-all-errors --retry-delay 10 --connect-timeout 30 --max-time 300 "$RELEASE_URL/sha256sums"
          curl -fsSLO --retry 5 --retry-all-errors --retry-delay 10 --connect-timeout 30 --max-time 900 "$RELEASE_URL/$imagebuilder"
          grep " \*$imagebuilder$" sha256sums | sha256sum -c -
          tar --zstd -xf "$imagebuilder"
          mv "${imagebuilder%.tar.zst}" imagebuilder

      - name: Build ImmortalWrt rootfs
        shell: bash
        env:
          VARIANT: ${{ matrix.variant }}
          EXTRA_PACKAGES: ${{ needs.prepare.outputs.extra_packages }}
          ROOTFS_PROFILE: ${{ needs.prepare.outputs.rootfs_profile }}
        run: |
          set -euo pipefail

          read_packages() {
            local file="$1"
            if [ -f "$file" ]; then
              sed -E 's/[[:space:]]*#.*$//' "$file" | xargs
            fi
          }

          variant_packages() {
            local variant="$1"
            local base_packages plus_packages bypass_packages
            base_packages=$(read_packages packages/base.txt)
            plus_packages=$(read_packages packages/plus.txt)
            bypass_packages=$(read_packages packages/bypass.txt)
            case "$variant" in
              base) printf '%s' "$base_packages" ;;
              plus) printf '%s %s %s' "$base_packages" "$plus_packages" "$EXTRA_PACKAGES" ;;
              bypass) printf '%s %s %s %s' "$base_packages" "$plus_packages" "$bypass_packages" "$EXTRA_PACKAGES" ;;
            esac | xargs
          }

          variant_needs_apk_force_overwrite() {
            case " $1 " in
              *' luci-app-openvpn-server '*) return 0 ;;
              *) return 1 ;;
            esac
          }

          enable_apk_force_overwrite() {
            if grep -qF '$(APK) add --force-overwrite --arch $(ARCH_PACKAGES) --no-scripts $(BUILD_PACKAGES)' Makefile; then
              return 0
            fi
            if ! grep -qF '$(APK) add --arch $(ARCH_PACKAGES) --no-scripts $(BUILD_PACKAGES)' Makefile; then
              echo 'Unable to find ImageBuilder APK install command to patch.' >&2
              exit 1
            fi
            cp Makefile Makefile.apk-force-overwrite.bak
            sed -i 's#$(APK) add --arch $(ARCH_PACKAGES) --no-scripts $(BUILD_PACKAGES)#$(APK) add --force-overwrite --arch $(ARCH_PACKAGES) --no-scripts $(BUILD_PACKAGES)#' Makefile
            echo 'Enabled apk --force-overwrite for this variant.'
          }

          packages=$(variant_packages "$VARIANT")
          cd imagebuilder
          if variant_needs_apk_force_overwrite "$packages"; then
            enable_apk_force_overwrite
          fi

          make image PROFILE="$ROOTFS_PROFILE" PACKAGES="$packages"

          mkdir -p ../rootfs
          rootfs_file=$(find bin/targets -type f -name '*rootfs.tar.gz' | head -n 1)
          [ -n "$rootfs_file" ] || { echo 'No rootfs.tar.gz was generated.' >&2; find bin/targets -type f >&2; exit 1; }
          cp -v "$rootfs_file" "../rootfs/immortalwrt-oect-${VARIANT}-rootfs.tar.gz"
          find bin/targets -type f \( -name '*.manifest' -o -name '*.buildinfo' -o -name 'profiles.json' \) -exec cp -v {} ../rootfs/ \;

      - name: Package OEC-turbo image
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: rootfs/immortalwrt-oect-${{ matrix.variant }}-rootfs.tar.gz
          openwrt_board: ${{ needs.prepare.outputs.board }}
          openwrt_kernel: ${{ env.OECT_KERNEL }}
          auto_kernel: ${{ env.OECT_AUTO_KERNEL }}
          kernel_repo: ${{ env.OECT_KERNEL_REPO }}
          kernel_usage: ${{ env.OECT_KERNEL_USAGE }}
          openwrt_size: 384/${{ matrix.rootfs_partsize }}
          openwrt_ip: '192.168.1.1'
          openwrt_files: ${{ matrix.openwrt_files }}
          builder_name: ${{ env.OECT_BUILDER_NAME }}

      - name: Verify packaged image defaults
        shell: bash
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail

          output_path="${PACKAGED_OUTPUTPATH:-}"
          [ -n "$output_path" ] || { echo 'PACKAGED_OUTPUTPATH is empty.' >&2; exit 1; }

          mapfile -t images < <(find "$output_path" -maxdepth 1 -type f -name '*.img.gz' | sort)
          [ "${#images[@]}" -gt 0 ] || { echo 'No packaged .img.gz image found.' >&2; exit 1; }

          tmpdir=$(mktemp -d)
          rootfs_tar="rootfs/immortalwrt-oect-${VARIANT}-rootfs.tar.gz"
          [ -f "$rootfs_tar" ] || { echo "Rootfs tarball not found: $rootfs_tar" >&2; exit 1; }
          expected_shadow="$tmpdir/expected-shadow"
          if ! tar -xOzf "$rootfs_tar" ./etc/shadow > "$expected_shadow" 2>/dev/null; then
            tar -xOzf "$rootfs_tar" etc/shadow > "$expected_shadow"
          fi
          expected_root_field=$(awk -F: '$1 == "root" { found = 1; print $2 } END { if (!found) exit 1 }' "$expected_shadow") || {
            echo 'Unable to read root password field from ImageBuilder rootfs.' >&2
            exit 1
          }

          loop_dev=''
          mount_dir=''
          cleanup() {
            if [ -n "$mount_dir" ]; then
              sudo umount "$mount_dir" 2>/dev/null || true
            fi
            if [ -n "$loop_dev" ]; then
              sudo losetup -d "$loop_dev" 2>/dev/null || true
            fi
            rm -rf "$tmpdir"
          }
          trap cleanup EXIT

          for image_gz in "${images[@]}"; do
            image="$tmpdir/$(basename "${image_gz%.gz}")"
            mount_dir="$tmpdir/mnt"
            mkdir -p "$mount_dir"

            gzip -dc "$image_gz" | dd of="$image" bs=16M conv=sparse status=none
            loop_dev=$(sudo losetup -P -f --show --read-only "$image")
            sudo partprobe "$loop_dev" 2>/dev/null || true
            sleep 2

            root_part="${loop_dev}p2"
            [ -b "$root_part" ] || { echo "Rootfs partition not found: $root_part" >&2; exit 1; }
            sudo mount -t btrfs -o ro "$root_part" "$mount_dir"

            actual_root_field=$(sudo awk -F: '$1 == "root" { found = 1; print $2 } END { if (!found) exit 1 }' \
              "$mount_dir/etc/shadow") || {
                echo 'Unable to read root password field from packaged image.' >&2
                exit 1
              }
            if [ "$actual_root_field" != "$expected_root_field" ]; then
              echo 'Packaged image changed the root password field from the ImageBuilder rootfs.' >&2
              exit 1
            fi
            if [ -z "$actual_root_field" ]; then
              echo "Verified root password field is preserved from ImageBuilder rootfs: empty ($(basename "$image_gz"))"
            else
              echo "Verified root password field is preserved from ImageBuilder rootfs: non-empty hash ($(basename "$image_gz"))"
            fi

            bypass_script="$mount_dir/etc/uci-defaults/99-bypass-router"
            if [ "$VARIANT" = 'bypass' ]; then
              sudo test -f "$bypass_script" || { echo 'Bypass defaults script is missing from bypass image.' >&2; exit 1; }
              sudo test -x "$bypass_script" || { echo 'Bypass defaults script is not executable.' >&2; exit 1; }
              sudo /bin/sh -n "$bypass_script"
              echo "Verified bypass defaults script is present and executable: $(basename "$image_gz")"
            else
              if sudo test -e "$bypass_script"; then
                echo 'Bypass defaults script leaked into a non-bypass image.' >&2
                exit 1
              fi
              echo "Verified no bypass defaults script in ${VARIANT}: $(basename "$image_gz")"
            fi

            sudo umount "$mount_dir"
            sudo losetup -d "$loop_dev"
            loop_dev=''
            mount_dir=''
            rm -f "$image"
          done

      - name: Collect variant artifacts
        shell: bash
        env:
          VARIANT: ${{ matrix.variant }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          mkdir -p release

          output_path="${PACKAGED_OUTPUTPATH:-}"
          [ -n "$output_path" ] || { echo 'PACKAGED_OUTPUTPATH is empty.' >&2; exit 1; }
          find "$output_path" -maxdepth 1 -type f -print

          while IFS= read -r src; do
            filename=$(basename "$src")
            dest="${filename%.img.gz}${SUFFIX}.img.gz"
            cp -v "$src" "release/$dest"
          done < <(find "$output_path" -maxdepth 1 -type f -name '*.img.gz')

          sha256sum release/* > release/sha256sums-${VARIANT}.txt

      - name: Upload variant artifact
        uses: actions/upload-artifact@v7
        with:
          name: immortalwrt-oect-${{ needs.prepare.outputs.version }}-${{ matrix.variant }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    if: always() && needs.prepare.result == 'success' && needs.build.result == 'success'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release files
        id: artifacts
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          VARIANTS: ${{ needs.prepare.outputs.variants }}
          BASE_ROOTFS_PARTSIZE: ${{ needs.prepare.outputs.base_rootfs_partsize }}
          PLUS_ROOTFS_PARTSIZE: ${{ needs.prepare.outputs.plus_rootfs_partsize }}
          BYPASS_ROOTFS_PARTSIZE: ${{ needs.prepare.outputs.bypass_rootfs_partsize }}
          BOARD: ${{ needs.prepare.outputs.board }}
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -exec cp -v {} release/ \;
          rm -f release/sha256sums.txt release/sha256sums-*.txt

          printf '%s\n' "$VARIANTS" > release/variants.txt
          cat > release/rootfs-partsize.txt <<EOF
          base=${BASE_ROOTFS_PARTSIZE}MiB
          plus=${PLUS_ROOTFS_PARTSIZE}MiB
          bypass=${BYPASS_ROOTFS_PARTSIZE}MiB
          EOF
          (cd release && sha256sum * > sha256sums.txt)

          release_date=$(TZ=Asia/Shanghai date +%Y.%m.%d)
          tag="immortalwrt-${VERSION}-oec-turbo-${BOARD}-${release_date}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=ImmortalWrt ${VERSION} OEC-turbo ${BOARD} ${release_date}" >> "$GITHUB_OUTPUT"

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifacts.outputs.tag }}
          path: release/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: needs.prepare.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.artifacts.outputs.tag }}
          name: ${{ steps.artifacts.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          make_latest: true
          overwrite_files: true
          files: release/*
          body: |
            基于官方 ImmortalWrt `${{ needs.prepare.outputs.version }}` 的 `${{ needs.prepare.outputs.target }} ${{ needs.prepare.outputs.rootfs_profile }}` rootfs，并使用 ophub/unifreq 打包链路生成 `${{ needs.prepare.outputs.board }}` 设备镜像。

            - Board: `${{ needs.prepare.outputs.board }}`
            - Rootfs target: `${{ needs.prepare.outputs.target }} ${{ needs.prepare.outputs.rootfs_profile }}`
            - Kernel: `${{ env.OECT_KERNEL }}` latest from `${{ env.OECT_KERNEL_REPO }}`
            - Variants: `${{ needs.prepare.outputs.variants }}`
            - Rootfs partition: base `${{ needs.prepare.outputs.base_rootfs_partsize }} MiB`, plus `${{ needs.prepare.outputs.plus_rootfs_partsize }} MiB`, bypass `${{ needs.prepare.outputs.bypass_rootfs_partsize }} MiB`

            变体说明：

            - 标准包：不带特殊后缀，使用官方 ImmortalWrt rootfs 默认包，不写入旁路由配置。
            - `*-plus.*`：在标准包基础上追加 `packages/plus.txt` 和手动输入的 `extra_packages`。
            - `*-bypass.*`：在 `plus` 基础上追加 `files/bypass` 下的旁路由首启配置，仅供自用，其他人请使用标准包或 `*-plus.*`。

            校验文件：`sha256sums.txt`。分区配置记录：`rootfs-partsize.txt`。
